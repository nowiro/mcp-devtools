version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: [dependencies, type:chore]
    groups:
      mcp-sdk:
        patterns: ['@modelcontextprotocol/*']
      vitest:
        patterns: ['vitest', '@vitest/*']
      eslint:
        patterns: ['eslint*', '@typescript-eslint/*', 'typescript-eslint']
      schema:
        patterns: ['zod', 'zod-to-json-schema']
      types:
        patterns: ['@types/*']
      prettier:
        patterns: ['prettier', 'prettier-plugin-*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, type:chore, ci]
