name: compliance-sarif

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 3' # Wednesday 05:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  compliance:
    name: compliance report (SARIF)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('docs/standards/**/*.md') != ''
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate SARIF report
        run: |
          npm run extract:compliance -- \
            --project-root=. \
            --standards-path=docs/standards \
            --format=sarif \
            --output=compliance.sarif
        continue-on-error: true # fail nie blokuje upload SARIF — code-scanning pokaże findings

      - name: Upload SARIF
        if: always() && hashFiles('compliance.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: compliance.sarif
          category: mcp-devtools-compliance

      - name: Upload artifact
        if: always() && hashFiles('compliance.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: compliance-sarif-${{ github.run_id }}
          path: compliance.sarif
          retention-days: 14
