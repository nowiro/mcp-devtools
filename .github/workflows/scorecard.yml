name: OpenSSF Scorecard

# Uruchom: cotygodniowo + przy każdym push do main.
# Wynik: SARIF na zakładce Security oraz publiczny scorecard.dev profil
# (gdy `publish_results: true` i repo jest publiczne).
#
# Aktywuj `publish_results: true` dopiero gdy repo jest publiczne — Scorecard
# probuje rzeczy takie jak branch protection, signed commits, CII best practices,
# które mają sens tylko dla OSS.
#
# Dokumentacja: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
  schedule:
    - cron: '32 5 * * 1' # poniedziałek 05:32 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # przesyła SARIF do code-scanning
      id-token: write # OIDC dla publish_results
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Ustaw na true dopiero gdy repo publiczne — wtedy wynik
          # ląduje na scorecard.dev/viewer.
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
